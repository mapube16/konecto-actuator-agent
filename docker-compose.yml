services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - actuator-data:/app/data
    healthcheck:
      # ponytail: probes GET /health — the app exposes GET, not POST (plan text had POST, no such route)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  actuator-data:
